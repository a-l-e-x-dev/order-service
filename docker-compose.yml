version: '3.8'

services:
  order-db:
    image: postgres:15-alpine
    container_name: order_service_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-order_db}
    ports:
      - "5434:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-order_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - order-network

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: order-service:latest
    container_name: order_service_app
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://order-db:5432/${POSTGRES_DB:-order_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - USER_SERVICE_URL=http://user-service:8082
    depends_on:
      order-db:
        condition: service_healthy
    networks:
      - order-network

networks:
  order-network:
    driver: bridge
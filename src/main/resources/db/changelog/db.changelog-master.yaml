databaseChangeLog:
  - changeSet:
      id: 1-create-schema
      author: system
      changes:
        - createTable:
            tableName: items
            columns:
              - column: {name: id, type: bigint, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: name, type: varchar(255), constraints: {nullable: false}}
              - column: {name: price, type: 'decimal(10,2)', constraints: {nullable: false}}
              - column: {name: created_at, type: timestamp, constraints: {nullable: false}}
              - column: {name: updated_at, type: timestamp, constraints: {nullable: false}}

        - createTable:
            tableName: orders
            columns:
              - column: {name: id, type: bigint, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: user_email, type: varchar(255), constraints: {nullable: false}}
              - column: {name: status, type: varchar(50), constraints: {nullable: false}}
              - column: {name: total_price, type: 'decimal(10,2)', constraints: {nullable: false}}
              - column: {name: deleted, type: boolean, defaultValueBoolean: false, constraints: {nullable: false}}
              - column: {name: created_at, type: timestamp, constraints: {nullable: false}}
              - column: {name: updated_at, type: timestamp, constraints: {nullable: false}}

        - createTable:
            tableName: order_items
            columns:
              - column: {name: id, type: bigint, autoIncrement: true, constraints: {primaryKey: true, nullable: false}}
              - column: {name: order_id, type: bigint, constraints: {nullable: false}}
              - column: {name: item_id, type: bigint, constraints: {nullable: false}}
              - column: {name: quantity, type: int, constraints: {nullable: false}}
              - column: {name: created_at, type: timestamp, constraints: {nullable: false}}
              - column: {name: updated_at, type: timestamp, constraints: {nullable: false}}

        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: order_id
            referencedTableName: orders
            referencedColumnNames: id
            constraintName: fk_order_items_order_id

        - addForeignKeyConstraint:
            baseTableName: order_items
            baseColumnNames: item_id
            referencedTableName: items
            referencedColumnNames: id
            constraintName: fk_order_items_item_id

        - createIndex: {tableName: orders, indexName: idx_orders_user_email, columns: [{column: {name: user_email}}]}
        - createIndex: {tableName: order_items, indexName: idx_order_items_order_id, columns: [{column: {name: order_id}}]}
        - createIndex: {tableName: order_items, indexName: idx_order_items_item_id, columns: [{column: {name: item_id}}]}
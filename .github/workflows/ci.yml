name: Order Service CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-test-and-package:
    name: Build, Test and Create Docker Image
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: order_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Tests
        run: mvn clean verify

      - name: Build Docker Image
        run: docker build -t my-order-service:${{ github.sha }} -t my-order-service:latest .

      - name: Save Docker Image as Tar Archive
        run: docker save my-order-service:latest > order-service-image.tar

      - name: Upload Artefact
        uses: actions/upload-artifact@v4
        with:
          name: order-service-docker-image
          path: order-service-image.tar
          retention-days: 5